schema: spec-driven

context: |
  Tech stack:
    Backend: Python 3.12, FastAPI, SQLAlchemy 2.0 async, Alembic, Celery, Redis, PostgreSQL 16
    Frontend: TypeScript, Next.js 15 App Router, Tailwind CSS 4, shadcn/ui, Zustand, React Hook Form + Zod
    Package managers: UV (backend), npm (frontend)
    Infra: Docker Compose, GitHub Actions CI

  Conventions:
    - Monorepo with /backend and /frontend as independent workspaces
    - Backend source lives in backend/src/app/ (modules by layer: routers, models, schemas, services, core, db, worker)
    - Frontend source lives in frontend/src/ with App Router at frontend/src/app/
    - Linting: Ruff (backend), ESLint + TypeScript strict (frontend)
    - Commits follow Conventional Commits
    - All env vars documented in .env.example files
    - Auth: JWT access token in client memory + httpOnly cookie refresh token (OWASP SPA pattern)
    - Refresh token rotation via Redis
    - Auto-migration on api container startup (alembic upgrade head)

  Domain: Multifolio — portfolio management application (greenfield)
